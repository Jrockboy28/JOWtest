{% extends "./layer1/base_layout3.html" %}
{% block body %}
<main class="main-content">
  <!--== Start Hero Area Wrapper ==-->
  <section class="contact-page-title-area parallax" data-speed="1.123" data-bg-img="{{ url_for('static', filename='img/photos/bg12.jpg') }}">
    <div class="container pt--0 pb--0">
      <div class="row">
        <div class="col-12">
          <div class="contact-page-title-content">
            <div class="content">
              <h4 class="title">If you like our work and want to cooperate, don’t hesitate to contact, <span>we’ll get back to you</span></h4>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!--== End Hero Area Wrapper ==-->

  <!--== Start Faq Area Wrapper ==-->
  <section class="contact-area">
    <div class="container-fluid p--0">
      <div class="row no-gutter">
        <div class="col-12">
          <div class="contact-page-wrapper">
            <div class="contact-page-column">
              <div class="column1">
                <!--== Start Contact Form ==-->
                <div class="contact-form contact-form-style2">
                  <h4 class="contact-form-title">Let’s Talk</h4>
                  <form id="contact-form" action="" method="POST">
                    <div class="row no-gutter">
                      <div class="col-12">
                        <div class="form-group">
                          <input class="form-control" type="text" name="con_name" placeholder="Your Name">
                        </div>
                      </div>
                      <div class="col-12">
                        <div class="form-group">
                          <input class="form-control" type="email" name="con_email" placeholder="Email Address">
                        </div>
                      </div>
                      <div class="col-12">
                        <div class="form-group">
                          <select class="form-control form-select" name="con_insterested" aria-label="Subject">
                            <option selected>You Interested In</option>
                            <option value="Web Design">Web Design</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Custom works">Custom works</option>
                            <option value="SEO">SEO</option>
                          </select>
                        </div>
                      </div>
                      <div class="col-12">
                        <div class="form-group">
                          <textarea class="form-control" name="con_message" placeholder="Message"></textarea>
                        </div>
                      </div>
                      <div class="col-12">
                        <div class="form-group mb--0">
                          <button class="btn-theme" type="submit">Let’s Talk</button>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
                <!--== End Contact Form ==-->

                <ul class="contact-info-list">
                  <li><span>A:</span>118 Mekow Way</li>
                  <li><span>E:</span>ve@mu.gov</li>
                  <li><span>P:</span>(977) 280-1527</li>
                </ul>

                <!--== Message Notification ==-->
                <div class="form-message"></div>
              </div>
              <div class="column2">
                <div class="contact-map-area">              
                  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.8402891185374!2d144.95373631590425!3d-37.81720974201477!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sEnvato!5e0!3m2!1sen!2ssg!4v1607294780661!5m2!1sen!2ssg"></iframe>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!--== End Faq Area Wrapper ==-->
</main>
{% endblock %}
